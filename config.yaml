# ClawMama Configuration

# Telegram Bot
bot:
  token: "YOUR_TELEGRAM_BOT_TOKEN"

# Firecracker settings
firecracker:
  # Path to firecracker binary
  binary_path: "/usr/bin/firecracker"
  # Path to kernel
  kernel_path: "/var/lib/clawmama/vmlinux"
  # Path to Ubuntu cloud image
  image_path: "/var/lib/clawmama/ubuntu-base.img"
  # Directory for VM working files
  vm_dir: "/var/lib/clawmama/vms"
  # Default VM resources
  default:
    vcpus: 2
    memory_mib: 2048
    disk_size_gb: 10

# Network settings
network:
  # Host side of the TAP interface
  host_ip: "172.30.0.1"
  # VM IP range
  vm_ip_start: "172.30.0.2"
  # Network CIDR
  cidr: "172.30.0.0/30"

# Security settings
security:
  # Enable network isolation
  isolate_network: true
  # Block all inbound connections
  block_inbound: true
  # Maximum resources per VM
  max_vcpus: 4
  max_memory_mib: 4096
  max_disk_gb: 20

# Backup settings
backup:
  # Directory to store backups
  dir: "/var/lib/clawmama/backups"
  # Compression level (1-9)
  compression: 6
